# Tezuka firmware — kernel tuning for IIO/DMA streaming
#
# Applied at boot by S02sysctl

# DMA streaming: allow large dirty buffers before writeout pressure
vm.dirty_ratio=80
vm.dirty_background_ratio=50

# No swap on this device
vm.swappiness=0

# IIO network streaming: large socket buffers for iiod over TCP
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.core.rmem_default=1048576
net.core.wmem_default=1048576

# Disable RT throttling — iiod runs at SCHED_FIFO 99 on core 1
# Default 950000 (95%) can throttle sustained RT workloads
kernel.sched_rt_runtime_us=-1
