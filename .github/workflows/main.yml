name: CI

on:
  # Tag pushes publish a GitHub release with git-cliff notes and per-board
  # zips. SemVer pattern (v-prefixed) triggers the release pipeline.
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Manual dispatch for smoke testing. The release job is skipped for
  # dispatch runs; only artifacts are produced.
  workflow_dispatch:
    inputs:
      boards:
        description: 'Comma-separated board names, or "all" (validated against boards.json)'
        type: string
        required: false
        default: "all"
      release:
        description: "Create a draft release (for testing)"
        type: boolean
        required: false
        default: false

# Cancel in-progress dispatch runs on new dispatch of the same ref, but
# never cancel a tag-push release build (a half-published release is worse
# than a queued one).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

permissions:
  contents: read

run-name: >-
  ${{ github.event_name == 'push'
      && format('Release {0}', github.ref_name)
      || format('CI ({0})', inputs.boards || 'all') }}

jobs:
  matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      # 'true' iff exactly one board in the matrix. Used by tezuka
      # job to gate the output/<board> cache.
      single_board: ${{ steps.set-matrix.outputs.single_board }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve build matrix
        id: set-matrix
        env:
          INPUT: ${{ inputs.boards || 'all' }}
        run: |
          set -euo pipefail
          if [ "$INPUT" = "all" ]; then
            INCLUDE=$(jq -c . boards.json)
          else
            # Reject unknown names up front; GitHub's own "matrix must define
            # at least one vector" only surfaces at job-expansion time and
            # doesn't hint at the cause.
            INCLUDE=$(jq -c --arg input "$INPUT" '
              ($input | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length>0))) as $wanted
              | ($wanted - [.[].board]) as $unknown
              | if ($unknown | length) > 0 then
                  error("Unknown board(s): " + ($unknown | join(", ")))
                else
                  [.[] | select(.board as $b | $wanted | index($b))]
                end
            ' boards.json)
          fi
          COUNT=$(jq 'length' <<<"$INCLUDE")
          echo "matrix={\"include\":${INCLUDE}}" >> "$GITHUB_OUTPUT"
          # 'true' iff dispatched with a single board; gates the
          # per-board output/ cache (3 GB) which doesn't fit budget
          # at COUNT=12.
          if [ "$COUNT" -eq 1 ]; then
            echo "single_board=true" >> "$GITHUB_OUTPUT"
          else
            echo "single_board=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### Matrix expansion"
            echo
            echo "Input: \`${INPUT}\` (${COUNT} boards)"
            echo
            jq -r '.[] | "- `\(.board)` -> `\(.defconfig)`"' <<<"$INCLUDE"
          } >> "$GITHUB_STEP_SUMMARY"

  tezuka:
    needs: matrix
    runs-on: ubuntu-22.04
    name: ${{ matrix.defconfig }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    env:
      BR2_EXTERNAL: ${{ github.workspace }}
      BR2_DL_DIR: /home/runner/br-dl
      OUTPUT_DIR: ${{ github.workspace }}/output/${{ matrix.board }}

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false

      - name: Install build dependencies
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -y make gcc g++ \
            zip unzip dfu-util fakeroot u-boot-tools device-tree-compiler \
            mtools bison flex libncurses5-dev libssl-dev bc cpio rsync \
            cmake xz-utils libgmp-dev libmpc-dev bootgen-xlnx libclang-dev \
            libgnutls28-dev

      # Hashed on package version pins -- defconfig flag toggles
      # don't change tarball identity, so they shouldn't invalidate.
      - name: Restore Buildroot downloads
        id: dl-cache
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/br-dl
          key: br-dl-${{ hashFiles('package/**/*.mk', 'package/**/*.hash', 'buildroot.version') }}
          restore-keys: br-dl-

      # Global key: BR2_CCACHE_USE_BASEDIR (set in Configure below)
      # makes hits portable across per-board OUTPUT_DIR paths.
      - name: Restore ccache
        id: ccache-cache
        uses: actions/cache/restore@v5
        with:
          path: /home/runner/.buildroot-ccache
          key: ccache-v3-${{ hashFiles('buildroot.version') }}
          restore-keys: ccache-v3-

      # On miss, getbuildroot.sh populates the tree below.
      - name: Restore Buildroot tree
        id: br-cache
        uses: actions/cache/restore@v5
        with:
          path: buildroot
          key: buildroot-${{ hashFiles('buildroot.version', 'patches/buildroot/**') }}

      - name: Populate Buildroot tree
        if: steps.br-cache.outputs.cache-hit != 'true'
        run: ./getbuildroot.sh

      # Full per-board OUTPUT_DIR. Hit -> Buildroot sees every
      # stamp_built and 'make' just re-finalises (~5min vs ~50min).
      # Single-board only: 12 x ~3 GB busts the 10 GB budget. No
      # restore-keys: partial match leaves an unrepairable state.
      # Iterate via: gh workflow run main.yml -f boards=fishball7020
      - name: Restore Buildroot output
        id: output-cache
        if: needs.matrix.outputs.single_board == 'true'
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.OUTPUT_DIR }}
          key: output-${{ matrix.board }}-${{ hashFiles('package/**/*.mk', 'package/**/*.hash', 'buildroot.version', 'patches/buildroot/**', format('configs/{0}', matrix.defconfig)) }}

      # uboot-env-hook.mk writes this in the source tree at U-Boot
      # extract time; with output/ cached, extract is skipped and the
      # file goes missing. Recreate it idempotently here.
      - name: Regenerate uboot-env.config (cache workaround)
        run: |
          {
            echo 'CONFIG_USE_DEFAULT_ENV_FILE=y'
            printf 'CONFIG_DEFAULT_ENV_FILE="%s/board/tezuka/common/uboot-env.txt"\n' "$PWD"
          } > board/tezuka/common/uboot-env.config

      - name: Configure ${{ matrix.board }}
        run: |
          make -C buildroot O="${OUTPUT_DIR}" ${{ matrix.defconfig }}
          # Default BR2_CCACHE_DIR=$HOME/.buildroot-ccache matches the
          # cache restore path; USE_BASEDIR makes hits portable across
          # boards' OUTPUT_DIRs. Caveat: relative paths leak into
          # object files, debuggers need 'cd $OUTPUT_DIR' first.
          echo 'BR2_CCACHE=y' >> "${OUTPUT_DIR}/.config"
          echo 'BR2_CCACHE_USE_BASEDIR=y' >> "${OUTPUT_DIR}/.config"
          make -C buildroot O="${OUTPUT_DIR}" olddefconfig

      - name: Build U-Boot
        run: make -C buildroot O="${OUTPUT_DIR}" uboot

      # Kernel build dir cache (~500MB vs 3GB full output). Small enough for
      # multi-board: 12×~200MB (compressed) ≈ 2.4GB, fits in 10GB limit.
      # Key includes kernel config files so CMA/etc changes bust only this
      # cache, leaving the main output cache intact (uboot/rootfs stay hot).
      - name: Restore kernel build cache
        id: kernel-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/kernel-cache.tar.gz
          key: kernel-${{ matrix.board }}-${{ hashFiles('board/tezuka/**/kernel/**/*', 'buildroot.version', format('configs/{0}', matrix.defconfig)) }}

      - name: Extract kernel build cache
        if: steps.kernel-cache.outputs.cache-hit == 'true'
        run: |
          mkdir -p "${OUTPUT_DIR}/build"
          tar -xzf /tmp/kernel-cache.tar.gz -C "${OUTPUT_DIR}/build"

      # Kernel cache miss on single-board: main output cache may have restored
      # old build/linux-* with stale stamps, tricking Buildroot into skipping.
      # Nuke it so Buildroot always sees a clean state when kernel config changed.
      - name: Remove stale kernel stamps
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: rm -rf "${OUTPUT_DIR}"/build/linux-*

      - name: Build kernel
        run: make -C buildroot O="${OUTPUT_DIR}" linux

      - name: Build rootfs
        run: make -C buildroot O="${OUTPUT_DIR}" target-finalize

      - name: Assemble image
        run: make -C buildroot O="${OUTPUT_DIR}"

      # Save phase. 'if cache-hit != true' avoids re-uploading
      # already-cached content and prevents duplicate entries on
      # the backend (concurrent matrix saves don't dedupe reliably).
      - name: Save Buildroot tree
        if: steps.br-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: buildroot
          key: ${{ steps.br-cache.outputs.cache-primary-key }}

      - name: Save Buildroot output
        if: needs.matrix.outputs.single_board == 'true' && steps.output-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.OUTPUT_DIR }}
          key: ${{ steps.output-cache.outputs.cache-primary-key }}

      - name: Archive kernel build for caching
        id: kernel-archive
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          LINUX_DIR=$(ls -d "${OUTPUT_DIR}/build/linux-"* 2>/dev/null || true)
          if [ -n "$LINUX_DIR" ]; then
            tar -czf /tmp/kernel-cache.tar.gz \
              -C "$(dirname "$LINUX_DIR")" "$(basename "$LINUX_DIR")"
            echo "archived=true" >> "$GITHUB_OUTPUT"
          else
            echo "archived=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save kernel build cache
        if: steps.kernel-archive.outputs.archived == 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/kernel-cache.tar.gz
          key: ${{ steps.kernel-cache.outputs.cache-primary-key }}

      - name: Save ccache
        if: steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /home/runner/.buildroot-ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Save Buildroot downloads
        if: steps.dl-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /home/runner/br-dl
          key: ${{ steps.dl-cache.outputs.cache-primary-key }}

      - name: Assemble artifact
        run: |
          mkdir -p build
          cp "${OUTPUT_DIR}/images/tezuka.zip" "build/${{ matrix.board }}.zip"
          REV="${GITHUB_SHA::7}"
          ARTIFACT_DIR="artifacts/tezuka-${{ matrix.board }}"
          mkdir -p "${ARTIFACT_DIR}"
          unzip -q "build/${{ matrix.board }}.zip" -d "${ARTIFACT_DIR}"
          {
            echo "### ${{ matrix.board }} (${{ matrix.defconfig }})"
            echo
            echo "Revision: \`${REV}\`"
            echo
            echo "| File | Size |"
            echo "| --- | ---: |"
            (cd "${ARTIFACT_DIR}" && find . -type f -printf '%s\t%P\n' | sort -k2) \
              | while IFS=$'\t' read -r bytes name; do
                  human=$(numfmt --to=iec --format='%.1f' "${bytes}")
                  # shellcheck disable=SC2016
                  printf '| `%s` | %s |\n' "${name}" "${human}"
                done
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate SBOM
        run: |
          python3 -m pip install -q cyclonedx-buildroot
          make -C buildroot O="${OUTPUT_DIR}" legal-info
          python3 -m cyclonedx_buildroot \
            -i "${OUTPUT_DIR}/legal-info/manifest.csv" \
            -n "tezuka-${{ matrix.board }}" \
            -v "${GITHUB_SHA::7}" \
            -o "artifacts/tezuka-${{ matrix.board }}/sbom"

          # bom/ — license texts + SBOM copies for the release
          ARTIFACT="artifacts/tezuka-${{ matrix.board }}"
          mkdir -p "${ARTIFACT}/bom/licenses"
          cp -r "${OUTPUT_DIR}/legal-info/licenses/." "${ARTIFACT}/bom/licenses/."
          cp "${ARTIFACT}/sbom.json" "${ARTIFACT}/bom/sbom.json"
          cp "${ARTIFACT}/sbom.xml" "${ARTIFACT}/bom/sbom.xml"

          # README + LICENSE at artifact root
          cp README.md "${ARTIFACT}/README.md"
          cp LICENSE "${ARTIFACT}/LICENSE"
          ls -la "${ARTIFACT}/"

      - name: Attest artifact with SBOM
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/build/${{ matrix.board }}.zip
          sbom-path: ${{ github.workspace }}/artifacts/tezuka-${{ matrix.board }}/sbom.json

      - name: Clean up root duplicates
        run: |
          rm -f "artifacts/tezuka-${{ matrix.board }}/sbom.json"
          rm -f "artifacts/tezuka-${{ matrix.board }}/sbom.xml"

      - name: Cache restore summary
        run: |
          {
            echo "### Cache restore (${{ matrix.board }})"
            echo
            echo "| cache | hit |"
            echo "|---|---|"
            echo "| Buildroot downloads | ${{ steps.dl-cache.outputs.cache-hit || 'miss' }} |"
            echo "| ccache              | ${{ steps.ccache-cache.outputs.cache-hit || 'miss' }} |"
            echo "| Buildroot tree      | ${{ steps.br-cache.outputs.cache-hit || 'miss' }} |"
            echo "| Buildroot output    | ${{ steps.output-cache.outputs.cache-hit || 'miss' }} |"
            echo "| Kernel build        | ${{ steps.kernel-cache.outputs.cache-hit || 'miss' }} |
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tezuka-${{ matrix.board }}
          path: artifacts/tezuka-${{ matrix.board }}/
          if-no-files-found: error

  release:
    needs: tezuka
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      || github.event_name == 'workflow_dispatch' && inputs.release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
      attestations: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # git-cliff walks full history

      - name: Compute changelog range
        id: cliff-range
        env:
          TAG: ${{ github.ref_name }}
          FALLBACK_BASE: 365ea2e
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${FALLBACK_BASE}..${TAG}"
          fi
          echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
          echo "Changelog range: ${RANGE}"

      - name: Generate release notes
        if: github.event_name == 'push'
        continue-on-error: true
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            ${{ steps.cliff-range.outputs.range }}
            --strip header
        env:
          OUTPUT: NOTES.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback release notes
        run: |
          if [ ! -f NOTES.md ]; then
            echo 'CI test release' > NOTES.md
          fi

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: tezuka-*

      - name: Package release zips
        env:
          TAG: ${{ github.event_name == 'push' && github.ref_name || format('ci-test-{0}', github.sha) }}
        run: |
          set -euo pipefail
          REV="${GITHUB_SHA::7}"
          # Works with both flat (single artifact) and subdirectory layout
          if ls artifacts/tezuka-*/ >/dev/null 2>&1; then
            for dir in artifacts/tezuka-*/; do
              board="$(basename "${dir%/}")"
              board="${board#tezuka-}"
              mv "${dir%/}" "artifacts/tezuka-${board}-${TAG}-${REV}"
              (cd artifacts && zip -rq "../tezuka-${board}-${TAG}-${REV}.zip" "tezuka-${board}-${TAG}-${REV}")
            done
          else
            # Flat download — rename and zip the whole tree
            mv artifacts "tezuka-${TAG}-${REV}"
            zip -rq "tezuka-${TAG}-${REV}.zip" "tezuka-${TAG}-${REV}"
            mkdir artifacts
            mv "tezuka-${TAG}-${REV}" artifacts/
          fi

      - name: Publish release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          flags=""
          [[ "$TAG" == *-* ]] && flags="--prerelease"
          gh release create "$TAG" $flags --draft --title "$TAG" --notes-file NOTES.md tezuka-*.zip

      - name: Release summary
        run: |
          {
            echo "## Release ${TAG}"
            echo
            echo "| Zip | Size | SHA256 |"
            echo "| --- | ---: | --- |"
            for zip in tezuka-*.zip; do
              bytes=$(stat -c %s "${zip}")
              human=$(numfmt --to=iec --format='%.1f' "${bytes}")
              sha=$(sha256sum "${zip}" | cut -d' ' -f1)
              # shellcheck disable=SC2016 # %s placeholders, not shell vars
              printf '| `%s` | %s | `%s` |\n' "${zip}" "${human}" "${sha}"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Attest release zips
        uses: actions/attest@v4
        with:
          subject-path: ${{ github.workspace }}/tezuka-*.zip
