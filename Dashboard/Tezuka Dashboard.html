<script>
// Append ?v=<timestamp> to every text/babel src so Babel's XHR always
// fetches the latest file, not a cached copy. Runs synchronously before
// Babel's DOMContentLoaded handler fires.
(function () {
  var v = Date.now();
  document.querySelectorAll('script[type="text/babel"][src]').forEach(function (s) {
    s.setAttribute('src', s.getAttribute('src').split('?')[0] + '?v=' + v);
  });
}());
</script>
