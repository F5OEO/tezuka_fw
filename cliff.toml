# git-cliff config for tezuka_fw release notes.
# Consumed by .github/workflows/main.yml on tag push.

[changelog]
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}\
{% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{{ commit.message | split(pat="\n") | first | trim }} \
([{{ commit.id | truncate(length=7, end="") }}](https://github.com/gretel/miyazaki/commit/{{ commit.id }}))\
{%- endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
topo_order = true
sort_commits = "newest"
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+(-.+)?$"
ignore_tags = "^backup-.*"

commit_preprocessors = [
  # Rewrite squash-merge "(#123)" suffix into markdown link.
  { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/gretel/miyazaki/pull/${1}))" },
]

commit_parsers = [
  # Drop noise.
  { message = "^[Mm]erge",              skip = true },
  { message = "^[Rr]evert",             skip = true },
  # Breaking changes win over type grouping.
  { message = ".*!:",                   group = "Breaking Changes" },
  { body    = ".*BREAKING[ _-]CHANGE",  group = "Breaking Changes" },
  # Conventional types + project-specific prefixes.
  { message = "^feat",                  group = "Features" },
  { message = "^fix",                   group = "Bug Fixes" },
  { message = "^perf",                  group = "Performance" },
  { message = "^refactor",              group = "Refactor" },
  { message = "^docs?",                 group = "Documentation" },
  { message = "^test",                  group = "Testing" },
  { message = "^build|^ci",             group = "Build / CI" },
  { message = "^dts|^kernel|^uboot",    group = "Kernel / U-Boot / DTS" },
  { message = "^buildroot|^defconfig",  group = "Buildroot" },
  { message = "^bitstream|^board",      group = "FPGA / Board" },
  { message = "^package",               group = "Packages" },
  { message = "^toolchain",             group = "Toolchain" },
  { message = "^cleanup|^chore",        group = "Chore" },
  { message = ".*",                     group = "Other" },
]

link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/gretel/miyazaki/issues/$1" },
]

[bump]
features_always_bump_minor = true
breaking_always_bump_major = false   # pre-1.0: breaking -> minor, not major
